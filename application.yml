spring:
  application:
      name: Config-default
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true   # Eureka server में खुद को register करेगा
    fetch-registry: true         # अन्य services की registry fetch करेगा
    service-url:
      defaultZone: http://localhost:8761/eureka
